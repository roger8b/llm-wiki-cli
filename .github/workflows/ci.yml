name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '24'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

  test:
    name: Test with Coverage
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push coverage badge to badges branch
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: test
        run: |
          set -o pipefail
          npm test -- --coverage 2>&1 | tee test-output.txt

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PCT=$(node -e "
            const s = require('./coverage/coverage-summary.json');
            const pct = s.total?.lines?.pct ?? s.total?.statements?.pct ?? 0;
            process.stdout.write(String(Math.round(pct)));
          ")
          COLOR=$(node -e "
            const p = $PCT;
            process.stdout.write(p >= 90 ? 'brightgreen' : p >= 75 ? 'yellow' : 'red');
          ")
          BADGE="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null \
            && git checkout badges \
            || (git checkout --orphan badges && git rm -rf . --quiet 2>/dev/null; true)

          echo "$BADGE" > coverage.json
          git add coverage.json
          git diff --cached --quiet \
            && echo "badge unchanged" \
            || git commit -m "chore: update coverage badge to ${PCT}% [skip ci]"
          git push origin badges
          git checkout -

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_id }}
          path: |
            coverage/
            test-output.txt
          retention-days: 7

      - name: Publish coverage to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const output = fs.readFileSync('./test-output.txt', 'utf8');

            const passedMatch = output.match(/Test Files\s+.*?(\d+) passed/);
            const failedMatch = output.match(/Tests\s+.*?(\d+) failed/);
            const passed = passedMatch ? parseInt(passedMatch[1]) : 0;
            const failed = failedMatch ? parseInt(failedMatch[1]) : 0;

            const t = summary.total;
            const pct = (v) => typeof v?.pct === 'number' ? v.pct.toFixed(1) + '%' : '—';
            const ok  = (v, min = 90) => typeof v?.pct === 'number' ? (v.pct >= min ? '✅' : '❌') : '—';

            const comment = `## 📊 Test Coverage Report

            | Metric | Coverage | Status |
            |--------|----------|--------|
            | 📝 Lines | ${pct(t.lines)} | ${ok(t.lines)} |
            | 📊 Statements | ${pct(t.statements)} | ${ok(t.statements)} |
            | 🌿 Branches | ${pct(t.branches)} | ℹ️ |
            | 🔧 Functions | ${pct(t.functions)} | ${ok(t.functions)} |

            ### Test Results
            - ✅ **Passed:** ${passed}
            - ❌ **Failed:** ${failed}

            ---
            *Report generated automatically*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes('📊 Test Coverage Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      - name: Check coverage threshold
        run: |
          node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const threshold = 90;
            // branches excluded: utility-file branches are harder to exercise;
            // vitest already enforces lines/statements/functions thresholds
            const checked = ['lines', 'statements', 'functions'];

            console.log('\n📊 Coverage Thresholds Check (threshold: >=' + threshold + '%):');
            console.log('');

            let allPassed = true;
            for (const metric of checked) {
              const data = summary.total[metric];
              if (!data) continue;
              const pass = data.pct >= threshold;
              console.log('   ' + (pass ? '✅' : '❌') + ' ' + metric + ': ' + data.pct + '%');
              if (!pass) allPassed = false;
            }
            const bp = summary.total.branches?.pct ?? '—';
            console.log('   ℹ️  branches: ' + bp + '% (informational)');
            console.log('');
            if (!allPassed) { console.log('❌ FAILED: Coverage below threshold'); process.exit(1); }
            console.log('✅ All coverage thresholds met!');
          "

  mutation-test:
    name: Mutation Testing (Stryker)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests
        run: npx stryker run

      - name: Publish mutation report to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = './reports/mutation/mutation.json';
            if (!fs.existsSync(reportPath)) {
              console.log('No mutation report found — skipping comment');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const files = report.files ?? {};

            let killed = 0, survived = 0, timeout = 0, noCoverage = 0, total = 0;
            const survivedList = [];

            for (const [filePath, fileData] of Object.entries(files)) {
              for (const mutant of (fileData.mutants ?? [])) {
                total++;
                switch (mutant.status) {
                  case 'Killed':     killed++;     break;
                  case 'Survived':   survived++;   survivedList.push({ filePath, mutant }); break;
                  case 'Timeout':    timeout++;    break;
                  case 'NoCoverage': noCoverage++; survivedList.push({ filePath, mutant }); break;
                }
              }
            }

            const tested = killed + survived + timeout + noCoverage;
            const score = tested > 0 ? ((killed + timeout) / tested * 100).toFixed(1) : '0.0';
            const { high, low, break: brk } = report.thresholds ?? { high: 90, low: 80, break: 80 };
            const scoreNum = parseFloat(score);
            const scoreEmoji = scoreNum >= high ? '🟢' : scoreNum >= low ? '🟡' : '🔴';

            let survivedSection = '';
            if (survivedList.length > 0) {
              const rows = survivedList.slice(0, 20).map(({ filePath, mutant }) => {
                const loc = mutant.location
                  ? `L${mutant.location.start.line}:${mutant.location.start.column}`
                  : '—';
                const orig = (mutant.replacement ?? mutant.original ?? '').replace(/`/g, "'").slice(0, 60);
                return `| \`${filePath}\` | \`${loc}\` | ${mutant.mutatorName} | \`${orig}\` |`;
              }).join('\n');
              survivedSection = `
            ### 🧬 Survived / NoCoverage mutants (${survivedList.length}${survivedList.length > 20 ? ', first 20 shown' : ''})

            | File | Location | Mutator | Replacement |
            |------|----------|---------|-------------|
            ${rows}`;
            }

            const comment = `## 🧬 Mutation Test Report

            | Metric | Value |
            |--------|-------|
            | ${scoreEmoji} **Score** | **${score}%** |
            | ✅ Killed | ${killed} |
            | ❌ Survived | ${survived} |
            | ⏱ Timeout | ${timeout} |
            | 🚫 No Coverage | ${noCoverage} |
            | **Total mutants** | **${total}** |

            **Thresholds:** 🟢 ≥${high}% · 🟡 ≥${low}% · 🔴 <${brk}% (breaks build)
            ${survivedSection}
            ---
            *Full HTML report available in [CI artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes('🧬 Mutation Test Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      - name: Upload mutation report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-test-report-${{ github.run_id }}
          path: reports/
          retention-days: 14
