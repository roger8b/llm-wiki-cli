name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[agent,ollama,api,mcp,dev]"
      - name: Ruff
        run: ruff check src/ tests/
      - name: Mypy
        # NOTE: mypy is `strict` but not yet clean across the tree. Keep it
        # non-blocking until the type debt is paid down, then drop this flag.
        continue-on-error: true
        run: mypy src/llmwiki

  test:
    name: Tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -e ".[agent,ollama,api,mcp,dev]"
      - name: Pytest (with coverage)
        run: pytest --cov=src/llmwiki --cov-report=term-missing

  build-python-pkg:
    name: Build Python Package (CLI & Server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install (clean, lockfile-faithful)
        run: npm --prefix ui ci
      - name: Type-check + build SPA
        run: |
          # Delete fresh so Vite cannot skip the build (mtime-based incremental).
          rm -rf src/llmwiki/interfaces/api/dist/
          npm --prefix ui run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Upload Python Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/*
          if-no-files-found: error

  build-desktop:
    name: Build macOS Desktop App (Tauri)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Desktop App
        run: ./build_desktop.sh
      - name: Upload macOS Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-app
          path: ui/src-tauri/target/release/bundle/
          if-no-files-found: error

  frontend-unit:
    name: Frontend unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install Node dependencies
        run: npm --prefix ui ci
      - name: Vitest
        run: npm --prefix ui test

  webkit-e2e:
    name: WebKit smoke tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install Node dependencies
        run: npm --prefix ui ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python package (serves the SPA)
        run: pip install -e ".[agent,ollama,api,mcp]"
      - name: Build SPA into the package
        run: |
          # Delete fresh so Vite cannot skip the build (mtime-based incremental).
          rm -rf src/llmwiki/interfaces/api/dist/
          npm --prefix ui run build
      - name: Install Playwright WebKit
        working-directory: ui
        run: npx playwright install --with-deps webkit
      - name: Run WebKit smoke tests
        working-directory: ui
        run: npm run test:e2e

