name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    name: Build macOS Desktop App (Tauri)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # Step 1: build SPA first so PyInstaller bundles the current frontend
      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend SPA
        working-directory: ui
        run: npm run build

      # Step 2: compile Python sidecar binary (PyInstaller)
      - name: Install Python dependencies
        run: |
          pip install -e ".[agent,ollama,api,mcp]"
          pip install pyinstaller

      - name: Build PyInstaller sidecar
        run: PYTHON="$(which python)" ./scripts/build_sidecar.sh

      # Step 3: build Tauri macOS app
      - name: Clean stale DMG mounts
        run: |
          while [ -d "/Volumes/llm-wiki" ]; do
            hdiutil detach "/Volumes/llm-wiki" -force >/dev/null 2>&1 || break
          done
          rm -f ui/src-tauri/target/release/bundle/macos/rw.*.dmg 2>/dev/null || true

      - name: Build Tauri app
        working-directory: ui
        run: npx tauri build

      - name: Upload macOS desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-app
          path: ui/src-tauri/target/release/bundle/
          if-no-files-found: error
